<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Image Studio - Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .loader { border-top-color: #000; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .image-card:hover .overlay { opacity: 1; }
    </style>
</head>
<body>

    <div class="min-h-screen p-4 md:p-10">
        <div class="max-w-5xl mx-auto">
            
            <header class="text-center mb-12">
                <div class="inline-block bg-black p-4 rounded-3xl mb-6 shadow-2xl">
                    <i class="fas fa-wand-magic-sparkles text-white text-3xl"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">IA Image Studio</h1>
                <p class="text-slate-500 mt-3 text-lg">Crea arte visual con Gemini Imagen</p>
            </header>

            <div class="glass-card rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-6 md:p-8 mb-16">
                <div class="flex flex-col gap-6">
                    <textarea id="promptInput" 
                        placeholder="Describe tu imagen aquí... (ej: Paisaje futurista en Marte)"
                        class="w-full text-xl p-6 bg-slate-50/50 rounded-3xl border-2 border-transparent focus:border-slate-200 focus:bg-white outline-none transition-all resize-none h-40 leading-relaxed"
                    ></textarea>

                    <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div id="statusText" class="text-slate-400 text-sm font-medium flex items-center gap-2">
                            <i class="fas fa-circle-info"></i>
                            Escribe una descripción para comenzar
                        </div>

                        <button id="generateBtn" 
                            class="w-full sm:w-auto bg-black hover:bg-slate-800 text-white px-10 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all hover:scale-[1.02] active:scale-95 shadow-xl shadow-slate-200">
                            <span>Generar Imagen</span>
                            <i class="fas fa-paper-plane text-sm"></i>
                        </button>
                    </div>
                </div>

                <div id="errorBox" class="hidden mt-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl flex items-center gap-3">
                    <i class="fas fa-circle-exclamation"></i>
                    <p id="errorMessage" class="text-sm font-semibold"></p>
                </div>
            </div>

            <div class="mb-8 flex items-center justify-between px-2">
                <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight flex items-center gap-3">
                    <i class="fas fa-images text-slate-400"></i>
                    Galería de Creaciones
                </h2>
            </div>

            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <div id="emptyState" class="text-center py-24 bg-white/40 rounded-[3rem] border-4 border-dashed border-slate-100">
                <i class="fas fa-palette text-slate-200 text-6xl mb-4"></i>
                <p class="text-slate-400 text-xl font-medium">Tu galería está esperando tu primera idea</p>
            </div>

        </div>
    </div>

    <script>
        /**
         * ==========================================
         * API KEY CONFIGURADA
         * ==========================================
         */
        const GEMINI_API_KEY = "AIzaSyDXxe9YoOM27gMv2-KmqBn3R6RLsKJO0O4";

        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const galleryGrid = document.getElementById('galleryGrid');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const emptyState = document.getElementById('emptyState');

        let isGenerating = false;

        async function generateImage(retryCount = 0) {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            if (!GEMINI_API_KEY || GEMINI_API_KEY === "" || GEMINI_API_KEY.includes("AGREGA")) {
                showError("Configura una API Key válida en el código.");
                return;
            }

            setLoadingState(true);
            errorBox.classList.add('hidden');

            // Usamos Imagen 3.0 que suele ser el modelo gratuito disponible
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${GEMINI_API_KEY}`;
            
            const payload = {
                instances: [{ prompt: prompt }],
                parameters: { sampleCount: 1 }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (!response.ok) {
                    // Si falla Imagen 3, el error te dirá por qué. 
                    // Algunos proyectos requieren activar la facturación aunque sea gratuita.
                    throw new Error(result.error?.message || `Error ${response.status}`);
                }
                
                if (result.predictions && result.predictions[0].bytesBase64Encoded) {
                    const base64Data = result.predictions[0].bytesBase64Encoded;
                    addImageToGallery(base64Data, prompt);
                    promptInput.value = "";
                } else {
                    throw new Error("La respuesta no contiene una imagen válida.");
                }
            } catch (err) {
                if (retryCount < 3 && !err.message.toLowerCase().includes("key") && !err.message.includes("paid")) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    setTimeout(() => generateImage(retryCount + 1), delay);
                    return;
                }
                showError(err.message);
            } finally {
                if (retryCount === 0) setLoadingState(false);
            }
        }

        function setLoadingState(loading) {
            isGenerating = loading;
            generateBtn.disabled = loading;
            promptInput.disabled = loading;
            if (loading) {
                generateBtn.innerHTML = `<div class="loader w-5 h-5 border-2 rounded-full animate-spin"></div> <span>Generando...</span>`;
                statusText.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Procesando tu creación...`;
            } else {
                generateBtn.innerHTML = `<span>Generar Imagen</span> <i class="fas fa-paper-plane text-sm"></i>`;
                statusText.innerHTML = `<i class="fas fa-circle-check text-emerald-500"></i> Listo para otra`;
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function addImageToGallery(base64, prompt) {
            emptyState.classList.add('hidden');
            const imageUrl = `data:image/png;base64,${base64}`;
            const id = Date.now();
            const card = document.createElement('div');
            card.className = "image-card group relative bg-white rounded-[2.5rem] overflow-hidden shadow-lg border border-slate-100 transition-all hover:shadow-2xl hover:-translate-y-1";
            card.innerHTML = `
                <img src="${imageUrl}" alt="${prompt}" class="w-full aspect-square object-cover">
                <div class="overlay absolute inset-0 bg-black/70 opacity-0 transition-opacity flex flex-col justify-end p-8 text-white">
                    <p class="text-sm font-medium mb-6 line-clamp-3 italic">"${prompt}"</p>
                    <div class="flex gap-3">
                        <button onclick="downloadImg('${imageUrl}', ${id})" class="flex-1 bg-white text-black py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-100">
                            <i class="fas fa-download"></i> Guardar
                        </button>
                        <button onclick="this.closest('.image-card').remove(); checkEmpty();" class="bg-red-500/20 hover:bg-red-500 text-white p-3 rounded-2xl">
                            <i class="fas fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `;
            galleryGrid.prepend(card);
        }

        function downloadImg(url, id) {
            const a = document.createElement('a'); a.href = url; a.download = `ia-art-${id}.png`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function checkEmpty() { if (galleryGrid.children.length === 0) emptyState.classList.remove('hidden'); }

        generateBtn.addEventListener('click', () => generateImage());
    </script>
</body>
</html>
